<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveX - Cyber Optics Sandbox</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #060b18;
  --bg-secondary: #0a0e1a;
  --bg-tertiary: #0f1525;
  --bg-card: #111827;
  --bg-card-hover: #1a1f35;
  --bg-elevated: #1e2438;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-electric: #00d4ff;
  --accent-purple: #8b5cf6;
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --accent-yellow: #f59e0b;
  --border-color: rgba(59, 130, 246, 0.15);
  --border-active: rgba(59, 130, 246, 0.4);
  --gradient-primary: linear-gradient(135deg, #3b82f6, #06b6d4);
  --gradient-accent: linear-gradient(135deg, #3b82f6, #8b5cf6);
  --gradient-card: linear-gradient(145deg, rgba(17, 24, 39, 0.8), rgba(15, 21, 37, 0.9));
  --glow-blue: 0 0 20px rgba(59, 130, 246, 0.15), 0 0 40px rgba(59, 130, 246, 0.05);
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }
::selection { background: rgba(59, 130, 246, 0.3); color: var(--text-primary); }
h1, h2, h3, h4 { font-weight: 700; line-height: 1.3; letter-spacing: -0.02em; }
button { font-family: var(--font-sans); cursor: pointer; border: none; outline: none; transition: var(--transition); }
input { font-family: var(--font-sans); outline: none; transition: var(--transition); }

.glass-card {
  background: var(--gradient-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: var(--transition);
}
.glass-card:hover {
  border-color: var(--border-active);
  box-shadow: var(--glow-blue);
  transform: translateY(-1px);
}
.glass-card-static {
  background: var(--gradient-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  background: var(--bg-elevated);
  border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--gradient-primary);
  cursor: pointer;
  box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
  transition: var(--transition);
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type="range"]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--gradient-primary);
  cursor: pointer; border: none;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate-fade-in { animation: fadeIn 0.4s ease forwards; }
.animate-fade-in-up { animation: fadeInUp 0.5s ease forwards; }

.app {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px;
}

/* Labs page */
.labs-page { max-width: 1000px; margin: 0 auto; }
.page-header { text-align: center; margin-bottom: 32px; }
.page-title {
  font-size: 32px; margin-bottom: 8px;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-desc { color: var(--text-secondary); font-size: 15px; }
.labs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.lab-card { padding: 32px; text-align: left; cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; }
.lab-card-icon { font-size: 42px; margin-bottom: 16px; }
.lab-card-title { font-size: 19px; margin-bottom: 8px; }
.lab-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
.lab-card-action {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 600; color: var(--accent-cyan);
  margin-top: auto; transition: var(--transition);
}
.lab-card-action .arrow { transition: var(--transition); }
.lab-card:hover .arrow { transform: translateX(6px); }

/* Lab detail */
.lab-detail { max-width: 900px; margin: 0 auto; }
.back-btn { background: transparent; color: var(--accent-cyan); font-size: 14px; font-weight: 500; padding: 8px 0; margin-bottom: 16px; display: inline-block; }
.back-btn:hover { color: var(--accent-electric); }
.lab-detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.lab-detail-icon { font-size: 40px; }
.lab-detail-header h1 { font-size: 24px; }
.lab-detail-desc { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.lab-canvas-wrapper { padding: 0; overflow: hidden; margin-bottom: 16px; }
.canvas-container { width: 100%; }
.lab-canvas { width: 100%; height: 320px; display: block; }
.intensity-container { width: 100%; border-top: 1px solid var(--border-color); }
.intensity-canvas { width: 100%; height: 160px; display: block; }
.lab-controls { padding: 20px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }

/* Polarization lab */
.pol-layout { display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; align-items: start; margin-bottom: 16px; }
.pol-controls { padding: 20px; }
.pol-dial { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.pol-dial svg { cursor: pointer; touch-action: none; }
.pol-dial-value { font-size: 13px; font-family: var(--font-mono); color: var(--accent-yellow); }
.pol-meter { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; min-width: 180px; }
.pol-meter-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.pol-meter-header span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.pol-meter-value { font-size: 28px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); margin-bottom: 10px; }
.pol-meter-value small { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
.pol-meter-bar { width: 100%; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
.pol-meter-fill { height: 100%; border-radius: 4px; transition: width 0.15s; }
.pol-meter-pct { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 4px; font-family: var(--font-mono); }
.pol-canvas-wrapper { padding: 0; overflow: hidden; margin-bottom: 16px; }
.pol-malus { display: flex; align-items: center; justify-content: center; gap: 16px; font-size: 14px; font-family: var(--font-mono); padding: 16px; }
.pol-malus-label { color: var(--text-muted); }
.pol-malus-value { color: var(--accent-yellow); font-weight: 700; }
@media (max-width: 768px) {
  .pol-layout { grid-template-columns: 1fr; }
}
.controls-row { display: flex; gap: 20px; }
.control-group { flex: 1; }
.control-group label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.control-val { color: var(--accent-cyan); font-weight: 600; font-family: var(--font-mono); }
.controls-toggle { padding-top: 4px; }
.toggle-label { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
.toggle-label input { display: none; }
.toggle-track { width: 36px; height: 20px; background: var(--bg-elevated); border-radius: 10px; position: relative; transition: var(--transition); }
.toggle-label input:checked + .toggle-track { background: var(--accent-blue); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: var(--transition); }
.toggle-label input:checked + .toggle-track .toggle-thumb { left: 18px; }
.lab-info { padding: 20px; margin-bottom: 24px; }
.lab-info h3 { font-size: 16px; margin-bottom: 8px; }
.lab-info p { color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin: 8px 0; }
.info-formula { text-align: center; padding: 12px; margin: 12px 0; background: rgba(59, 130, 246, 0.05); border-radius: var(--radius-sm); font-family: var(--font-mono); color: var(--accent-electric); font-size: 18px; border: 1px solid rgba(59, 130, 246, 0.1); }

@media (max-width: 768px) {
  .controls-row { flex-direction: column; gap: 12px; }
  .lab-canvas { height: 240px; }
  .intensity-canvas { height: 130px; }
  .labs-grid { grid-template-columns: 1fr; }
  .app { padding: 16px; }
}
</style>
</head>
<body>
<div id="root" class="app"></div>

<script>
(function () {
'use strict';

const ROOT = document.getElementById('root');

// ---------- state ----------
let activeView = 'labs';

function navigate(view) {
  activeView = view;
  if (typeof window.__dsCleanup === 'function') { window.__dsCleanup(); window.__dsCleanup = null; }
  if (typeof window.__ssCleanup === 'function') { window.__ssCleanup(); window.__ssCleanup = null; }
  if (typeof window.__polCleanup === 'function') { window.__polCleanup(); window.__polCleanup = null; }
  render();
}

// ---------- render ----------
function render() {
  if (activeView === 'labs') renderLabs();
  else if (activeView === 'doubleslit') renderDoubleSlit();
  else if (activeView === 'singleslit') renderSingleSlit();
  else if (activeView === 'polarization') renderPolarization();
}

// ---------- Labs page ----------
function renderLabs() {
  ROOT.innerHTML = `
    <div class="labs-page animate-fade-in">
      <div class="page-header">
        <h1 class="page-title">WaveX Cyber Optics Sandbox</h1>
        <p class="page-desc">Explore optics through hands-on simulations</p>
      </div>
      <div class="labs-grid">
        <button class="lab-card glass-card" data-lab="doubleslit">
          <div class="lab-card-icon">🌈</div>
          <h3 class="lab-card-title">Young's Double Slit</h3>
          <p class="lab-card-desc">Interference pattern from two coherent sources — observe how light waves combine to create bright and dark fringes.</p>
          <div class="lab-card-action"><span>Launch Lab</span><span class="arrow">→</span></div>
        </button>
        <button class="lab-card glass-card" data-lab="singleslit">
          <div class="lab-card-icon">🔆</div>
          <h3 class="lab-card-title">Single Slit Diffraction</h3>
          <p class="lab-card-desc">Diffraction pattern from a single aperture — see how light spreads and creates a central maximum with secondary peaks.</p>
          <div class="lab-card-action"><span>Launch Lab</span><span class="arrow">→</span></div>
        </button>
        <button class="lab-card glass-card" data-lab="polarization">
          <div class="lab-card-icon">🔬</div>
          <h3 class="lab-card-title">Polarization</h3>
          <p class="lab-card-desc">Explore Malus's law with polarizers — see how light intensity changes as you rotate the analyzer relative to the polarizer.</p>
          <div class="lab-card-action"><span>Launch Lab</span><span class="arrow">→</span></div>
        </button>
      </div>
    </div>
  `;
  ROOT.querySelectorAll('[data-lab]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.lab));
  });
}

// ========================================================================
// YOUNG'S DOUBLE SLIT EXPERIMENT
// ========================================================================
function renderDoubleSlit() {
  ROOT.innerHTML = `
    <div class="lab-detail animate-fade-in">
      <button class="back-btn" id="ds-back">← Back to Labs</button>
      <div class="lab-detail-header">
        <span class="lab-detail-icon">🌈</span>
        <div>
          <h1>Young's Double Slit Experiment</h1>
          <p class="lab-detail-desc">Observe the interference pattern from two coherent light sources. Adjust parameters to see how they affect the fringe pattern.</p>
        </div>
      </div>
      <div class="lab-canvas-wrapper glass-card-static">
        <div class="canvas-container"><canvas id="ds-canvas" class="lab-canvas"></canvas></div>
        <div class="intensity-container"><canvas id="ds-intensity" class="intensity-canvas"></canvas></div>
      </div>
      <div class="lab-controls glass-card-static" id="ds-controls"></div>
      <div class="lab-info glass-card-static">
        <h3>About this experiment</h3>
        <p>In Young's double-slit experiment, light from a single source is split into two coherent beams that interfere, producing alternating bright and dark fringes. In the ideal case, all bright fringes have equal intensity.</p>
        <div class="info-formula">β = λL / d</div>
        <p><strong>Key observations:</strong> All bright fringes have equal intensity (ideal case). Fringes are equally spaced. Increasing d (slit separation) decreases fringe width. Increasing λ (wavelength) increases fringe width.</p>
      </div>
    </div>
  `;

  document.getElementById('ds-back').addEventListener('click', () => navigate('labs'));

  const params = { wavelength: 550, slitSeparation: 0.3, slitWidth: 0.08, screenDistance: 1.0 };
  let showWave = true;

  const canvas = document.getElementById('ds-canvas');
  const iCanvas = document.getElementById('ds-intensity');
  const controlsEl = document.getElementById('ds-controls');

  function buildControls() {
    controlsEl.innerHTML = `
      <div class="controls-row">
        <div class="control-group">
          <label>Wavelength (λ) <span class="control-val" id="ds-val-wl">${params.wavelength} nm</span></label>
          <input type="range" min="380" max="780" value="${params.wavelength}" id="ds-wl">
        </div>
        <div class="control-group">
          <label>Slit Separation (d) <span class="control-val" id="ds-val-d">${params.slitSeparation.toFixed(2)} mm</span></label>
          <input type="range" min="0.05" max="2.0" step="0.01" value="${params.slitSeparation}" id="ds-d">
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group">
          <label>Slit Width (a) <span class="control-val" id="ds-val-a">${params.slitWidth.toFixed(2)} mm</span></label>
          <input type="range" min="0.02" max="0.5" step="0.01" value="${params.slitWidth}" id="ds-a">
        </div>
        <div class="control-group">
          <label>Screen Distance (L) <span class="control-val" id="ds-val-l">${params.screenDistance.toFixed(1)} m</span></label>
          <input type="range" min="0.2" max="3.0" step="0.1" value="${params.screenDistance}" id="ds-l">
        </div>
      </div>
      <div class="controls-toggle">
        <label class="toggle-label">
          <input type="checkbox" ${showWave ? 'checked' : ''} id="ds-wave">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Show Wavefronts
        </label>
      </div>
    `;

    document.getElementById('ds-wl').addEventListener('input', e => {
      params.wavelength = Number(e.target.value);
      document.getElementById('ds-val-wl').textContent = params.wavelength + ' nm';
    });
    document.getElementById('ds-d').addEventListener('input', e => {
      params.slitSeparation = Number(e.target.value);
      document.getElementById('ds-val-d').textContent = params.slitSeparation.toFixed(2) + ' mm';
    });
    document.getElementById('ds-a').addEventListener('input', e => {
      params.slitWidth = Number(e.target.value);
      document.getElementById('ds-val-a').textContent = params.slitWidth.toFixed(2) + ' mm';
    });
    document.getElementById('ds-l').addEventListener('input', e => {
      params.screenDistance = Number(e.target.value);
      document.getElementById('ds-val-l').textContent = params.screenDistance.toFixed(1) + ' m';
    });
    document.getElementById('ds-wave').addEventListener('change', e => {
      showWave = e.target.checked;
    });
  }
  buildControls();

  let animId = 0;
  let time = 0;

  function setupCanvases() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 320;
    iCanvas.width = rect.width;
    iCanvas.height = 160;
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    const ictx = iCanvas.getContext('2d');
    if (!ctx || !ictx) return;

    const W = canvas.width, H = canvas.height;
    const iW = iCanvas.width, iH = iCanvas.height;
    const { wavelength, slitSeparation, slitWidth, screenDistance } = params;
    const d = slitSeparation;
    const a = slitWidth;
    const L = screenDistance;
    const lambda = wavelength * 1e-9;

    const scale = 180;
    const slitX = 100;
    const screenX = W - 70;

    // Background
    ctx.fillStyle = '#060b18';
    ctx.fillRect(0, 0, W, H);

    // Incident light
    ctx.fillStyle = 'rgba(59, 130, 246, 0.04)';
    for (let i = 0; i < 30; i++) {
      const x = slitX - 20 - i * 3;
      ctx.fillRect(x, 0, 2, H);
    }

    // Barrier
    ctx.fillStyle = '#1e2438';
    ctx.fillRect(slitX - 6, 0, 12, H);
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 1;
    ctx.strokeRect(slitX - 6, 0, 12, H);

    // Slits
    const slitH = 30;
    const slitCenter1 = H / 2 - d * scale / 2;
    const slitCenter2 = H / 2 + d * scale / 2;

    ctx.fillStyle = '#060b18';
    ctx.fillRect(slitX - 2, slitCenter1 - slitH / 2, 4, slitH);
    ctx.fillRect(slitX - 2, slitCenter2 - slitH / 2, 4, slitH);

    ctx.fillStyle = '#64748b';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('S₁', slitX, slitCenter1 - slitH / 2 - 8);
    ctx.fillText('S₂', slitX, slitCenter2 - slitH / 2 - 8);

    // Wavefronts
    if (showWave) {
      const t = time;
      for (let slit = 0; slit < 2; slit++) {
        const sy = slit === 0 ? slitCenter1 : slitCenter2;
        const maxR = screenX - slitX;
        for (let r = 0; r < maxR; r += 6) {
          const phase = (r / 60) * 2 * Math.PI * (lambda * 1e7) - t * 0.03;
          const alpha = 0.05 + 0.08 * Math.max(0, Math.sin(phase));
          const yRange = 2 + r * 0.008;
          ctx.beginPath();
          ctx.arc(slitX + r, sy, yRange, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(0, 212, 255, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // Interference fringes on screen
    for (let y = 0; y < H; y++) {
      const theta = Math.atan2(y - H / 2, screenX - slitX);
      const alpha = Math.PI * d * 1e-3 * Math.sin(theta) / lambda;
      const intensity = Math.cos(alpha) * Math.cos(alpha);
      const v = Math.round(Math.min(intensity, 1) * 220);
      ctx.fillStyle = `rgb(${v}, ${Math.round(v * 0.85)}, 255)`;
      ctx.fillRect(screenX, y, 8, 1);
    }

    // Screen edge
    ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(screenX, 0);
    ctx.lineTo(screenX, H);
    ctx.stroke();

    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Screen', screenX + 4, H - 8);

    // Rays
    const numRays = 120;
    for (let i = 0; i < numRays; i++) {
      const screenY = (i / numRays) * H;
      const theta = Math.atan2(screenY - H / 2, screenX - slitX);
      const alpha = Math.PI * d * 1e-3 * Math.sin(theta) / lambda;
      const intensity = Math.cos(alpha) * Math.cos(alpha);
      if (intensity > 0.01) {
        ctx.strokeStyle = `rgba(0, 212, 255, ${intensity * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(slitX + 6, H / 2);
        ctx.lineTo(screenX - 2, screenY);
        ctx.stroke();
      }
    }

    // Labels
    ctx.textAlign = 'left';
    ctx.font = '10px Inter, sans-serif';
    ctx.fillStyle = '#00d4ff';
    ctx.fillText(`λ = ${wavelength} nm`, 16, 20);
    ctx.fillStyle = '#3b82f6';
    ctx.fillText(`d = ${slitSeparation.toFixed(2)} mm`, 16, 38);
    ctx.fillStyle = '#06b6d4';
    ctx.fillText(`a = ${slitWidth.toFixed(2)} mm`, 16, 56);
    ctx.fillStyle = '#64748b';
    ctx.fillText(`L = ${screenDistance.toFixed(1)} m`, 16, 74);

    // ======== Intensity graph ========
    const iGrad = ictx.createLinearGradient(0, 0, 0, iH);
    iGrad.addColorStop(0, '#060b18');
    iGrad.addColorStop(1, '#0a0e1a');
    ictx.fillStyle = iGrad;
    ictx.fillRect(0, 0, iW, iH);

    const centerX = iW / 2;
    const points = [];
    const viewAngle = 0.025;
    for (let px = 0; px < iW; px++) {
      const theta = (px - centerX) / (iW / 2) * viewAngle;
      const alpha = Math.PI * d * 1e-3 * Math.sin(theta) / lambda;
      const intensity = Math.max(0, Math.cos(alpha) * Math.cos(alpha));
      const y = iH - 8 - intensity * (iH - 28);
      points.push({ x: px, y });
    }

    // Baseline
    ictx.strokeStyle = 'rgba(59, 130, 246, 0.2)';
    ictx.lineWidth = 1;
    ictx.beginPath();
    ictx.moveTo(0, iH - 8);
    ictx.lineTo(iW, iH - 8);
    ictx.stroke();

    // Curve
    if (points.length > 1) {
      ictx.beginPath();
      ictx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ictx.lineTo(points[i].x, points[i].y);
      ictx.strokeStyle = '#00d4ff';
      ictx.lineWidth = 2;
      ictx.stroke();
    }

    // Fill
    if (points.length > 1) {
      ictx.beginPath();
      ictx.moveTo(points[0].x, iH - 8);
      for (let i = 0; i < points.length; i++) ictx.lineTo(points[i].x, points[i].y);
      ictx.lineTo(points[points.length - 1].x, iH - 8);
      ictx.closePath();
      ictx.fillStyle = 'rgba(0, 212, 255, 0.08)';
      ictx.fill();
    }

    // Find peaks and troughs
    const peakPxs = [], troughPxs = [];
    for (let i = 2; i < points.length - 2; i++) {
      if (points[i].y < points[i - 1].y && points[i].y <= points[i + 1].y) peakPxs.push(points[i].x);
      if (points[i].y > points[i - 1].y && points[i].y >= points[i + 1].y) troughPxs.push(points[i].x);
    }

    // Title
    ictx.fillStyle = '#64748b';
    ictx.font = '9px Inter, sans-serif';
    ictx.textAlign = 'center';
    ictx.fillText('Interference Pattern (I vs θ)', iW / 2, 12);

    // Labels
    const labelTopY = 30;
    if (peakPxs.length > 0) {
      const cx = peakPxs[0];
      ictx.fillStyle = '#00d4ff';
      ictx.font = '8px Inter, sans-serif';
      ictx.textAlign = 'center';
      ictx.fillText('Central Bright', cx, labelTopY);
      ictx.fillText('Fringe (n=0)', cx, labelTopY + 10);

      // Fringe width bracket
      if (peakPxs.length > 1) {
        const p1 = peakPxs[1];
        const bracketY = labelTopY + 24;
        ictx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ictx.lineWidth = 1;
        ictx.beginPath();
        ictx.moveTo(cx, bracketY);
        ictx.lineTo(p1, bracketY);
        ictx.stroke();
        ictx.beginPath();
        ictx.moveTo(cx, bracketY - 4);
        ictx.lineTo(cx, bracketY + 4);
        ictx.stroke();
        ictx.beginPath();
        ictx.moveTo(p1, bracketY - 4);
        ictx.lineTo(p1, bracketY + 4);
        ictx.stroke();
        ictx.fillStyle = '#94a3b8';
        ictx.font = '8px Inter, sans-serif';
        ictx.textAlign = 'center';
        ictx.fillText('Fringe Width (β)', (cx + p1) / 2, bracketY - 3);
      }

      if (peakPxs.length > 1) {
        const p1 = peakPxs[1];
        ictx.fillStyle = '#00d4ff';
        ictx.font = '8px Inter, sans-serif';
        ictx.textAlign = 'center';
        ictx.fillText('Bright Fringe', p1, labelTopY);
        ictx.fillText('(n=1)', p1, labelTopY + 10);
      }

      if (troughPxs.length > 0) {
        const t1 = troughPxs[0];
        if (t1 > 0 && t1 < iW) {
          ictx.fillStyle = '#64748b';
          ictx.font = '8px Inter, sans-serif';
          ictx.textAlign = 'center';
          ictx.fillText('Dark Fringe', t1, iH - 16);
        }
      }
    }

    time++;
    animId = requestAnimationFrame(draw);
  }

  function start() {
    cancelAnimationFrame(animId);
    setupCanvases();
    time = 0;
    animId = requestAnimationFrame(draw);
  }

  const resizeHandler = () => { setupCanvases(); };
  window.addEventListener('resize', resizeHandler);
  start();

  // MutationObserver to detect control changes (sliders already update params directly)
  // Controls already have event listeners that update params, and draw reads params each frame
  // No need for extra observer since draw loop reads params live

  // Store cleanup
  const cleanup = () => {
    cancelAnimationFrame(animId);
    window.removeEventListener('resize', resizeHandler);
  };
  // We need to store this so it gets called when navigating away
  window.__dsCleanup = cleanup;
}

// SINGLE SLIT DIFFRACTION EXPERIMENT
// ========================================================================
function renderSingleSlit() {
  ROOT.innerHTML = `
    <div class="lab-detail animate-fade-in">
      <button class="back-btn" id="ss-back">← Back to Labs</button>
      <div class="lab-detail-header">
        <span class="lab-detail-icon">🔆</span>
        <div>
          <h1>Single Slit Diffraction</h1>
          <p class="lab-detail-desc">Observe the diffraction pattern from a single slit. The central maximum is twice as wide as the secondary maxima.</p>
        </div>
      </div>
      <div class="lab-canvas-wrapper glass-card-static">
        <div class="canvas-container"><canvas id="ss-canvas" class="lab-canvas"></canvas></div>
        <div class="intensity-container"><canvas id="ss-intensity" class="intensity-canvas"></canvas></div>
      </div>
      <div class="lab-controls glass-card-static" id="ss-controls"></div>
      <div class="lab-info glass-card-static">
        <h3>About Single Slit Diffraction</h3>
        <p>When light passes through a narrow slit, it spreads out (diffracts) due to the wave nature of light. The resulting pattern has a bright central maximum with alternating dark and bright fringes on either side.</p>
        <div class="info-formula">a sin θ = nλ (minima)</div>
        <p><strong>Key observations:</strong> The central maximum is twice as wide as the secondary maxima. The intensity of successive fringes decreases rapidly (secondary maxima are ~4.7% of the central peak). Decreasing slit width (a) widens the diffraction pattern.</p>
      </div>
    </div>
  `;

  document.getElementById('ss-back').addEventListener('click', () => navigate('labs'));

  const params = { wavelength: 550, slitWidth: 0.16, screenDistance: 1.0 };

  const canvas = document.getElementById('ss-canvas');
  const iCanvas = document.getElementById('ss-intensity');
  const controlsEl = document.getElementById('ss-controls');

  function buildControls() {
    controlsEl.innerHTML = `
      <div class="controls-row">
        <div class="control-group">
          <label>Wavelength (λ) <span class="control-val" id="ss-val-wl">${params.wavelength} nm</span></label>
          <input type="range" min="380" max="780" value="${params.wavelength}" id="ss-wl">
        </div>
        <div class="control-group">
          <label>Slit Width (a) <span class="control-val" id="ss-val-a">${params.slitWidth.toFixed(2)} mm</span></label>
          <input type="range" min="0.04" max="0.5" step="0.01" value="${params.slitWidth}" id="ss-a">
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group">
          <label>Screen Distance (L) <span class="control-val" id="ss-val-l">${params.screenDistance.toFixed(1)} m</span></label>
          <input type="range" min="0.2" max="3.0" step="0.1" value="${params.screenDistance}" id="ss-l">
        </div>
      </div>
    `;

    document.getElementById('ss-wl').addEventListener('input', e => {
      params.wavelength = Number(e.target.value);
      document.getElementById('ss-val-wl').textContent = params.wavelength + ' nm';
    });
    document.getElementById('ss-a').addEventListener('input', e => {
      params.slitWidth = Number(e.target.value);
      document.getElementById('ss-val-a').textContent = params.slitWidth.toFixed(2) + ' mm';
    });
    document.getElementById('ss-l').addEventListener('input', e => {
      params.screenDistance = Number(e.target.value);
      document.getElementById('ss-val-l').textContent = params.screenDistance.toFixed(1) + ' m';
    });
  }
  buildControls();

  let animId = 0;

  function setupCanvases() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 320;
    iCanvas.width = rect.width;
    iCanvas.height = 160;
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    const ictx = iCanvas.getContext('2d');
    if (!ctx || !ictx) return;

    const W = canvas.width, H = canvas.height;
    const iW = iCanvas.width, iH = iCanvas.height;
    const { wavelength, slitWidth, screenDistance } = params;
    const a = slitWidth;
    const lambda = wavelength;

    ctx.fillStyle = '#060b18';
    ctx.fillRect(0, 0, W, H);

    // Barrier
    const slitX = 100;
    const screenX = W - 50;

    ctx.fillStyle = '#1e2438';
    ctx.fillRect(slitX - 6, 0, 12, H);
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 1;
    ctx.strokeRect(slitX - 6, 0, 12, H);

    // Slit opening
    const slitH = a * 120;
    const slitY = (H - slitH) / 2;
    ctx.fillStyle = '#060b18';
    ctx.fillRect(slitX - 2, slitY, 4, slitH);

    ctx.fillStyle = '#64748b';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('a', slitX, slitY - 8);

    // Incident wavefronts
    ctx.fillStyle = 'rgba(59, 130, 246, 0.04)';
    for (let i = 0; i < 25; i++) {
      ctx.fillRect(slitX - 20 - i * 4, 0, 2, H);
    }

    // Huygens wavelets from slit
    const waveCount = 50;
    for (let i = 0; i < waveCount; i++) {
      const wy = slitY + (i / waveCount) * slitH;
      for (let r = 0; r < screenX - slitX; r += 4) {
        const theta = Math.atan2(wy - H / 2, r);
        const beta = Math.PI * a * 1e-3 * Math.sin(theta) / (lambda * 1e-9);
        const intensity = Math.abs(beta) < 0.001 ? 1 : Math.pow(Math.sin(beta) / beta, 2);
        if (intensity > 0.05) {
          const alpha = 0.02 * intensity;
          const yRange = 1 + r * 0.006;
          ctx.beginPath();
          ctx.arc(slitX + r, wy, yRange, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(0, 212, 255, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // Diffracted rays
    const numRays = 200;
    for (let i = 0; i < numRays; i++) {
      const sy = slitY + (i / numRays) * slitH;
      const screenY = (i / numRays) * H;
      const theta = Math.atan2(screenY - H / 2, screenX - slitX);
      const beta = Math.PI * a * 1e-3 * Math.sin(theta) / (lambda * 1e-9);
      const intensity = Math.abs(beta) < 0.001 ? 1 : Math.pow(Math.sin(beta) / beta, 2);
      if (intensity > 0.03) {
        ctx.strokeStyle = `rgba(0, 212, 255, ${intensity * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(slitX + 6, sy);
        ctx.lineTo(screenX - 2, screenY);
        ctx.stroke();
      }
    }

    // Diffraction fringes on screen
    for (let y = 0; y < H; y++) {
      const theta = Math.atan2(y - H / 2, screenX - slitX);
      const beta = Math.PI * a * 1e-3 * Math.sin(theta) / (lambda * 1e-9);
      const intensity = Math.abs(beta) < 0.001 ? 1 : Math.pow(Math.sin(beta) / beta, 2);
      const v = Math.round(Math.min(intensity, 1) * 220);
      ctx.fillStyle = `rgb(${v}, ${Math.round(v * 0.8)}, ${Math.round(v * 0.9 + 35)})`;
      ctx.fillRect(screenX, y, 8, 1);
    }

    ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(screenX, 0);
    ctx.lineTo(screenX, H);
    ctx.stroke();

    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Screen', screenX + 4, H - 8);

    // Annotate central maximum
    const centralY = H / 2;
    ctx.fillStyle = 'rgba(0, 212, 255, 0.5)';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('← Central Maximum →', screenX + 4, centralY - 10);

    // Labels
    ctx.fillStyle = '#00d4ff';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`λ = ${wavelength} nm`, 16, 20);
    ctx.fillStyle = '#3b82f6';
    ctx.fillText(`a = ${slitWidth.toFixed(2)} mm`, 16, 38);
    ctx.fillStyle = '#64748b';
    ctx.fillText(`L = ${screenDistance.toFixed(1)} m`, 16, 56);

    // ======== Intensity graph ========
    const iGrad = ictx.createLinearGradient(0, 0, 0, iH);
    iGrad.addColorStop(0, '#060b18');
    iGrad.addColorStop(1, '#0a0e1a');
    ictx.fillStyle = iGrad;
    ictx.fillRect(0, 0, iW, iH);

    const centerX = iW / 2;
    const viewAngle = 0.035;
    const points = [];
    for (let px = 0; px < iW; px++) {
      const theta = (px - centerX) / (iW / 2) * viewAngle;
      const beta = Math.PI * a * 1e-3 * Math.sin(theta) / (lambda * 1e-9);
      const intensity = Math.max(0, Math.abs(beta) < 0.001 ? 1 : Math.pow(Math.sin(beta) / beta, 2));
      const display = Math.sqrt(intensity);
      const y = iH - 8 - display * (iH - 28);
      points.push({ x: px, y });
    }

    ictx.strokeStyle = 'rgba(59, 130, 246, 0.2)';
    ictx.lineWidth = 1;
    ictx.beginPath();
    ictx.moveTo(0, iH - 8);
    ictx.lineTo(iW, iH - 8);
    ictx.stroke();

    if (points.length > 1) {
      ictx.beginPath();
      ictx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ictx.lineTo(points[i].x, points[i].y);
      ictx.strokeStyle = '#06b6d4';
      ictx.lineWidth = 2;
      ictx.stroke();
    }

    if (points.length > 1) {
      ictx.beginPath();
      ictx.moveTo(points[0].x, iH - 8);
      for (let i = 0; i < points.length; i++) ictx.lineTo(points[i].x, points[i].y);
      ictx.lineTo(points[points.length - 1].x, iH - 8);
      ictx.closePath();
      ictx.fillStyle = 'rgba(6, 182, 212, 0.08)';
      ictx.fill();
    }

    // Find peaks and minima
    const peakPxs = [];
    const minimaPxs = [];
    for (let i = 2; i < points.length - 2; i++) {
      if (points[i].y < points[i - 1].y && points[i].y <= points[i + 1].y) peakPxs.push(points[i].x);
      if (points[i].y > points[i - 1].y && points[i].y >= points[i + 1].y) {
        const intensityVal = 1 - (points[i].y - (iH - 8)) / (-points[i].y + iH - 8);
        if (intensityVal < 0.1) minimaPxs.push(points[i].x);
      }
    }

    // Title
    ictx.fillStyle = '#64748b';
    ictx.font = '9px Inter, sans-serif';
    ictx.textAlign = 'center';
    ictx.fillText('Single Slit Diffraction Pattern (I vs θ)', iW / 2, 12);

    // Labels
    const labelTopY = 30;
    if (peakPxs.length > 0) {
      const cx = peakPxs[0];
      ictx.fillStyle = '#00d4ff';
      ictx.font = '8px Inter, sans-serif';
      ictx.textAlign = 'center';
      ictx.fillText('Central Maximum', cx, labelTopY);
      ictx.fillText('(2× wider)', cx, labelTopY + 10);

      for (let i = 1; i < Math.min(peakPxs.length, 5); i++) {
        const sx = peakPxs[i];
        if (sx > 10 && sx < iW - 10) {
          ictx.fillStyle = i % 2 === 1 ? '#06b6d4' : '#3b82f6';
          ictx.font = '7px Inter, sans-serif';
          ictx.textAlign = 'center';
          const ord = i === 1 ? '1st' : i === 2 ? '2nd' : i === 3 ? '3rd' : `${i}th`;
          ictx.fillText(`${ord} Secondary`, sx, iH - 26);
          ictx.fillText('Maxima', sx, iH - 18);
        }
      }

      for (let i = 0; i < Math.min(minimaPxs.length, 5); i++) {
        const mx = minimaPxs[i];
        if (mx > 10 && mx < iW - 10) {
          ictx.fillStyle = '#64748b';
          ictx.font = '7px Inter, sans-serif';
          ictx.textAlign = 'center';
          ictx.fillText('Dark', mx, iH - 26);
          ictx.fillText('Fringe', mx, iH - 18);
        }
      }
    }

    animId = requestAnimationFrame(draw);
  }

  function start() {
    cancelAnimationFrame(animId);
    setupCanvases();
    animId = requestAnimationFrame(draw);
  }

  const resizeHandler = () => { setupCanvases(); };
  window.addEventListener('resize', resizeHandler);
  start();

  window.__ssCleanup = () => {
    cancelAnimationFrame(animId);
    window.removeEventListener('resize', resizeHandler);
  };
}

            <line id="pol-needle-bwd" x1="70" y1="70" x2="70" y2="87" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
            <circle cx="70" cy="70" r="5" fill="#f59e0b"/>
          </svg>
          <span style="font-size:13px;font-family:var(--font-mono);color:var(--accent-yellow);" id="pol-angle-display">0°</span>
        </div>

        <div class="pol-meter">
          <div class="pol-meter-header"><span style="font-size:16px;">💡</span><span>Lux Meter</span></div>
          <div class="pol-meter-value" id="pol-lux">100.0<small>lux</small></div>
          <div class="pol-meter-bar"><div class="pol-meter-fill" id="pol-meter-fill" style="width:100%;background:linear-gradient(90deg,#854d0e,#eab308)"></div></div>
          <div class="pol-meter-pct" id="pol-meter-pct">100%</div>
        </div>
      </div>

      <div class="pol-canvas-wrapper glass-card-static">
        <canvas id="pol-canvas" style="width:100%;height:200px;display:block;"></canvas>
      </div>

      <div class="pol-malus glass-card-static">
        <span class="pol-malus-label">Malus's Law: I = I₀ cos² θ</span>
        <span class="pol-malus-value" id="pol-malus">I = 1.000 × cos²(0°) = 1.000</span>
      </div>

      <div class="lab-info glass-card-static">
        <h3>About Polarization</h3>
        <p>Polarization describes the orientation of the electric field oscillations in a light wave. Unpolarized light has electric field vectors in all transverse directions. A polarizer transmits only the component of light aligned with its transmission axis.</p>
        <div class="info-formula">I = I₀ cos²(θ) &nbsp;&nbsp;—&nbsp;&nbsp; Malus's Law</div>
        <p>At θ = 90° (crossed polarizers), no light is transmitted. Polarization by reflection occurs at Brewster's angle: tan(θ<sub>B</sub>) = n₂/n₁.</p>
        <p><strong>Applications:</strong> 3D movies (polarized glasses), LCD screens, sunglasses (glare reduction), stress analysis.</p>
      </div>
    </div>
  `;

  document.getElementById('pol-back').addEventListener('click', () => navigate('labs'));

  let angle = 0;
  let sourceOn = true;
  let wavelength = 550;
  let animId = 0;
  let startTime = 0;

  const dialSvg = document.getElementById('pol-dial-svg');
  const dialFace = document.getElementById('pol-dial-face');
  const needleFwd = document.getElementById('pol-needle-fwd');
  const needleBwd = document.getElementById('pol-needle-bwd');
  const angleDisplay = document.getElementById('pol-angle-display');
  const luxEl = document.getElementById('pol-lux');
  const meterFill = document.getElementById('pol-meter-fill');
  const meterPct = document.getElementById('pol-meter-pct');
  const malusEl = document.getElementById('pol-malus');
  const sourceToggle = document.getElementById('pol-source');
  const wlSlider = document.getElementById('pol-wl');
  const wlVal = document.getElementById('pol-wl-val');
  const canvas = document.getElementById('pol-canvas');

  function wlToRGB(wl) {
    let r = 0, g = 0, b = 0;
    if (wl >= 380 && wl < 440) { r = -(wl - 440) / 60; g = 0; b = 1; }
    else if (wl >= 440 && wl < 490) { r = 0; g = (wl - 440) / 50; b = 1; }
    else if (wl >= 490 && wl < 510) { r = 0; g = 1; b = -(wl - 510) / 20; }
    else if (wl >= 510 && wl < 580) { r = (wl - 510) / 70; g = 1; b = 0; }
    else if (wl >= 580 && wl < 645) { r = 1; g = -(wl - 645) / 65; b = 0; }
    else if (wl >= 645 && wl <= 780) { r = 1; g = 0; b = 0; }
    const f = wl >= 380 && wl < 420 ? 0.3 + 0.7 * (wl - 380) / 40 : wl >= 420 && wl <= 700 ? 1 : 0.3 + 0.7 * (780 - wl) / 80;
    return { r: Math.round(255 * (r * f) ** 0.8), g: Math.round(255 * (g * f) ** 0.8), b: Math.round(255 * (b * f) ** 0.8) };
  }

  function buildDialFace() {
    const cx = 70, cy = 70, R = 58;
    let h = '';
    for (let i = 0; i < 360; i += 15) {
      const a = i * Math.PI / 180;
      const inR = i % 45 === 0 ? R - 14 : R - 6;
      h += '<line x1="' + (cx + inR * Math.cos(a)) + '" y1="' + (cy + inR * Math.sin(a)) + '" x2="' + (cx + R * Math.cos(a)) + '" y2="' + (cy + R * Math.sin(a)) + '" stroke="#475569" stroke-width="' + (i % 45 === 0 ? 2 : 1) + '"/>';
    }
    [{d:0,l:'0°'},{d:90,l:'90°'},{d:180,l:'180°'},{d:270,l:'270°'}].forEach(function(o) {
      const a = o.d * Math.PI / 180;
      h += '<text x="' + (cx + (R + 16) * Math.cos(a)) + '" y="' + (cy + (R + 16) * Math.sin(a)) + '" text-anchor="middle" dominant-baseline="central" fill="#94a3b8" font-size="10" font-family="monospace">' + o.l + '</text>';
    });
    dialFace.innerHTML = h;
  }

  function setNeedle(rad) {
    const cx = 70, cy = 70, R = 58;
    needleFwd.setAttribute('x2', cx + R * 0.75 * Math.cos(rad));
    needleFwd.setAttribute('y2', cy + R * 0.75 * Math.sin(rad));
    needleBwd.setAttribute('x2', cx - R * 0.3 * Math.cos(rad));
    needleBwd.setAttribute('y2', cy - R * 0.3 * Math.sin(rad));
  }

  function angleFromPoint(cx, cy, mx, my) {
    let a = Math.atan2(my - cy, mx - cx);
    return a < 0 ? a + 2 * Math.PI : a;
  }

  function getDialCenter() {
    const r = dialSvg.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  }

  function deg(rad) { return ((rad * 180 / Math.PI) % 360 + 360) % 360; }

  function refresh() {
    const d = deg(angle);
    angleDisplay.textContent = d.toFixed(0) + '\u00B0';
    const I = sourceOn ? Math.cos(angle) ** 2 : 0;
    const p = Math.round(I * 100);
    luxEl.innerHTML = (I * 100).toFixed(1) + '<small>lux</small>';
    meterFill.style.width = p + '%';
    meterFill.style.background = p > 75 ? 'linear-gradient(90deg,#eab308,#facc15)' : p > 25 ? 'linear-gradient(90deg,#854d0e,#eab308)' : 'linear-gradient(90deg,#451a03,#854d0e)';
    meterPct.textContent = p + '%';
    malusEl.textContent = 'I = 1.000 \u00D7 cos\u00B2(' + d.toFixed(0) + '\u00B0) = ' + I.toFixed(3);
  }

  dialSvg.addEventListener('pointerdown', function(e) {
    var c = getDialCenter();
    angle = angleFromPoint(c.cx, c.cy, e.clientX, e.clientY);
    setNeedle(angle);
    refresh();

    function onMove(e) { e.preventDefault(); var c2 = getDialCenter(); angle = angleFromPoint(c2.cx, c2.cy, e.clientX, e.clientY); setNeedle(angle); refresh(); }
    function onUp() { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });

  sourceToggle.addEventListener('change', function(e) { sourceOn = e.target.checked; refresh(); });

  wlSlider.addEventListener('input', function(e) {
    wavelength = Number(e.target.value);
    wlVal.textContent = wavelength + ' nm';
  });

  function setupCanvas() {
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width;
    canvas.height = 200;
  }

  function draw(ts) {
    if (!startTime) startTime = ts;
    const t = (ts - startTime) / 1000;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    const W = canvas.width, H = canvas.height;
    const xP = Math.round(W / 3), xA = Math.round(2 * W / 3), cy = Math.round(H / 2);
    const amp = sourceOn ? 22 : 0;
    const rgb = wlToRGB(wavelength);
    const col = 'rgb(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ')';
    const d = deg(angle);

    ctx.fillStyle = '#060b18';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = '#1e2438';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(xP,0); ctx.lineTo(xP,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xA,0); ctx.lineTo(xA,H); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#64748b';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Unpolarized', Math.round(W/6), 14);
    ctx.fillText('Polarizer', xP, 14);
    ctx.fillText('Analyzer @ ' + d.toFixed(0) + '\u00B0', xA, 14);
    ctx.font = '9px Inter, sans-serif';
    ctx.fillText('Source', 8, H-6);
    ctx.fillText('Polarizer', xP, H-6);
    ctx.fillText('Analyzer', xA, H-6);

    ctx.strokeStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.12)';
    ctx.lineWidth = 0.5;
    for (var w = -4; w <= 4; w++) {
      var off = w * 2.5;
      ctx.beginPath();
      for (var x = 8; x < xP - 6; x++) {
        var y = cy + off + amp * 0.3 * Math.sin(x * 0.06 + t * 3 + w * 0.8);
        x === 8 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    ctx.strokeStyle = col;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (var x = 0; x < xA - xP - 10; x++) {
      var y = cy + amp * Math.sin((xP + 8 + x) * 0.06 + t * 3);
      x === 0 ? ctx.moveTo(xP + 8, y) : ctx.lineTo(xP + 8 + x, y);
    }
    ctx.stroke();

    var tAmp = amp * Math.abs(Math.cos(angle));
    if (tAmp > 0.5) {
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (var x = 0; x < W - xA - 10; x++) {
        var y = cy + tAmp * Math.sin((xA + 8 + x) * 0.06 + t * 3);
        x === 0 ? ctx.moveTo(xA + 8, y) : ctx.lineTo(xA + 8 + x, y);
      }
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(148,163,184,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W-2,0); ctx.lineTo(W-2,H); ctx.stroke();
    ctx.fillStyle = '#64748b';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Screen', W-2, H-6);

    animId = requestAnimationFrame(draw);
  }

  function start() {
    cancelAnimationFrame(animId);
    setupCanvas();
    startTime = 0;
    buildDialFace();
    setNeedle(0);
    refresh();
    animId = requestAnimationFrame(draw);
  }

  var resizeHandler = function() { setupCanvas(); };
  window.addEventListener('resize', resizeHandler);
  start();

  window.__polCleanup = function() {
    cancelAnimationFrame(animId);
    window.removeEventListener('resize', resizeHandler);
  };
}

// ---------- Initial render ----------
render();

})();
</script>
</body>
</html>
